<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}{{ world.name if world else 'N&D World' }} — World{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css"/>
  {% if world %}<style>:root { --neon: {{ world.accent }}; }</style>{% endif %}
</head>
<body>
<nav class="topbar">
  <a class="logo" href="/">N&amp;D <span>WORLD</span></a>

  <!-- World switcher -->
  <div class="world-switcher">
    <button class="world-btn" onclick="this.parentElement.classList.toggle('open')">
      🌐 {{ world.name if world else 'Select World' }} ▾
    </button>
    <div class="world-dropdown">
      {% for w in worlds %}
      <a href="/worlds/switch/{{ w.slug }}" class="world-option {% if world and world.id == w.id %}active{% endif %}"
         style="--w-accent: {{ w.accent }}">
        {{ w.name }}
      </a>
      {% endfor %}
      <a href="/worlds" class="world-option manage">⚙ Manage worlds</a>
    </div>
  </div>

  <form class="search-form" action="/search" method="get">
    <input name="q" placeholder="Search world…" value="{{ request.query_params.get('q','') }}"/>
    <button type="submit">⌕</button>
  </form>
  <div class="nav-kinds">
    {% for k in kinds %}
    <a href="/kind/{{ k }}" class="nav-kind {% if request.url.path == '/kind/'+k %}active{% endif %}">
      {{ kind_icons[k] }} {{ k|capitalize }}
    </a>
    {% endfor %}
    <a href="/new" class="btn-new">+ New</a>
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<footer>{{ world.name if world else 'N&D World' }} — self-hosted</footer>
<script>
document.addEventListener('click', e => {
  if (!e.target.closest('.world-switcher')) {
    document.querySelectorAll('.world-switcher').forEach(el => el.classList.remove('open'));
  }
});
</script>
</body>
</html>
